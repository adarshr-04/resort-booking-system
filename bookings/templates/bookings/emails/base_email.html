<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            background-color: #F2EFE6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #1A3C34;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .header {
            padding: 40px 20px;
            text-align: center;
            background-color: #F2EFE6;
        }
        .header h1 {
            margin: 0;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 24px;
            color: #1A3C34;
        }
        .header p {
            margin: 5px 0 0;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.7;
        }
        .body {
            padding: 40px 30px;
        }
        .body h2 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            font-size: 28px;
            margin-bottom: 25px;
        }
        .button {
            display: inline-block;
            padding: 14px 28px;
            background-color: #1A3C34;
            color: #ffffff !important;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 11px;
            font-weight: bold;
            margin: 20px 0;
        }
        .footer {
            padding: 30px;
            text-align: center;
            font-size: 12px;
            color: #666666;
            background-color: #F9FAFB;
        }
        .footer a {
            color: #1A3C34;
            text-decoration: underline;
        }
        .highlight-box {
            background-color: #F2EFE6;
            padding: 20px;
            margin: 20px 0;
            border-left: 2px solid #1A3C34;
        }
        @media screen and (max-width: 600px) {
            .body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Brand Header -->
        <div class="header">
            <h1>Pristine Woods</h1>
            <p>Coorg, Karnataka</p>
        </div>

        <!-- Main Content Section -->
        <div class="body">
            {% block content %}
            {% endblock %}
        </div>

        <!-- Professional Footer -->
        <div class="footer">
            <p><strong>Coorg Pristine Woods</strong><br>
            Madikeri, Coorg, Karnataka, India</p>
            <p>
                <a href="{{ frontend_url }}">Our Website</a> | 
                <a href="{{ frontend_url }}/contact">Contact Concierge</a>
            </p>
            <p style="font-size: 10px; margin-top: 20px; opacity: 0.6;">
                © 2026 Coorg Pristine Woods. All rights reserved.<br>
                This is a transactional email regarding your stay or account.
            </p>
        </div>
    </div>
</body>
</html>
